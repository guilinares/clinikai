services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clinikai-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - clinikai_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinikai-net

  # ─── Backend Spring Boot (imagem publicada pelo GitHub Actions no GHCR) ──────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/clinikai-backend:${IMAGE_TAG:-latest}
    container_name: clinikai-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SECURITY_JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: https://${DOMAIN}/api/integrations/google/callback
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ZAPI_INSTANCE_ID: ${ZAPI_INSTANCE_ID}
      ZAPI_TOKEN: ${ZAPI_TOKEN}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN}
      ZAPI_SECURITY_TOKEN: ${ZAPI_SECURITY_TOKEN}
      CRYPTO_MASTER_KEY_BASE64: ${CRYPTO_MASTER_KEY_BASE64}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      APP_FRONTEND_BASE_URL: https://${DOMAIN}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clinikai-net

  # ─── Nginx + HTTPS ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: clinikai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./clinikai-admin/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - clinikai-net

  certbot:
    image: certbot/certbot
    container_name: clinikai-certbot
    volumes:
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  clinikai_pgdata:

networks:
  clinikai-net:
    driver: bridge
