<div class="wrap">
  <div class="panel card">
    <div class="brand">
      <div class="mark">ClinikAI</div>
      <div class="tagline">Painel administrativo</div>
    </div>

    <form (ngSubmit)="submit()">
      <label class="label">Email</label>
      <input
        class="input"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
        type="email"
        autocomplete="username"
        required
      />

      <label class="label" style="margin-top:12px;">Senha</label>
      <input
        class="input"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
        type="password"
        autocomplete="current-password"
        required
      />

      @if (warning()) {
        <div class="warning">{{ warning() }}</div>
      }

      @if (error()) {
        <div class="error">{{ error() }}</div>
      }

      <button class="btn btn-primary submit" [disabled]="loading()">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="hint">
        Dica: você pode acessar outra clínica saindo e entrando novamente.
      </div>
    </form>
  </div>
</div>
