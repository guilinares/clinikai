# ─── HTTP: redireciona tudo para HTTPS + desafio Certbot ─────────────────────
server {
    listen 80;
    server_name clinikai.com.br;

    # Necessário para o Certbot renovar certificados
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name clinikai.com.br;

    ssl_certificate     /etc/letsencrypt/live/clinikai.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinikai.com.br/privkey.pem;

    # Configurações SSL modernas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── API Backend ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts para webhooks de longa duração
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ─── Webhooks Z-API e Asaas (sem cache) ──────────────────────────────────
    location /webhook/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ─── Admin Dashboard Angular (SPA) ───────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # Necessário para o roteamento do Angular funcionar
        try_files $uri $uri/ /index.html;

        # Cache para assets com hash no nome
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
