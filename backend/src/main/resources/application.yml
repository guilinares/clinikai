server:
  port: 8080

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/api/integrations/google/callback

asaas:
  base-url: https://api.asaas.com/v3
  api-key: ${ASAAS_API_KEY}

security:
  crypto:
    master-key-base64: ${CRYPTO_MASTER_KEY_BASE64}
spring:
  application:
    name: clinikai

  datasource:
    url: jdbc:postgresql://localhost:5432/clinikai
    username: clinikai
    password: clinikai

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    url: jdbc:postgresql://localhost:5432/clinikai
    password: clinikai
    user: clinikai
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: TRACE

app:
  webhooks:
    zapi:
      secret: "CHANGE_ME_DEV_SECRET"
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-minutes: 60
      issuer: clinikai

zapi:
  base-url: https://api.z-api.io
  instance-id: ${ZAPI_INSTANCE_ID}
  token: ${ZAPI_TOKEN}
  client-token: ${ZAPI_CLIENT_TOKEN}

n8n:
  webhook-url: https://seu-n8n.com/webhook/flow-refine
  secret: seu-secret-aqui
  