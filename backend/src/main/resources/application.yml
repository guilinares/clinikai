server:
  port: 8080

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:test-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:test-client-secret}
    redirect-uri: http://localhost:8080/api/integrations/google/callback

asaas:
  base-url: https://api.asaas.com/v3
  api-key: ${ASAAS_API_KEY:test-asaas-key}

security:
  crypto:
    master-key-base64: ${CRYPTO_MASTER_KEY_BASE64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

spring:
  application:
    name: clinikai

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clinikai}
    username: ${SPRING_DATASOURCE_USERNAME:clinikai}
    password: ${SPRING_DATASOURCE_PASSWORD:clinikai}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: TRACE

app:
  webhooks:
    zapi:
      secret: "CHANGE_ME_DEV_SECRET"
  security:
    jwt:
      secret: ${JWT_SECRET:test-jwt-secret-for-dev-and-ci-only-change-in-prod}
      access-token-minutes: 60
      issuer: clinikai

zapi:
  base-url: https://api.z-api.io
  instance-id: ${ZAPI_INSTANCE_ID:test-instance-id}
  token: ${ZAPI_TOKEN:test-token}
  client-token: ${ZAPI_CLIENT_TOKEN:test-client-token}

n8n:
  webhook-url: ${N8N_WEBHOOK_URL:https://test.example.com/webhook}
  secret: ${N8N_SECRET:test-secret}
