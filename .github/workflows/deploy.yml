name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'clinikai-admin/**'
      - 'docker-compose.prod.yml'
      - 'nginx/**'
  workflow_dispatch: # permite rodar manualmente

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/clinikai-backend

jobs:
  # ─── 1. Testes e build do backend ─────────────────────────────────────────
  test-and-build:
    name: Test & Build Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clinikai
          POSTGRES_USER: clinikai
          POSTGRES_PASSWORD: clinikai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        working-directory: backend
        run: ./gradlew test --no-daemon

      - name: Build JAR
        working-directory: backend
        run: ./gradlew bootJar --no-daemon -x test

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 1

  # ─── 2. Build e push da imagem Docker para o GHCR ─────────────────────────
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-and-build
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Deploy na EC2 ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-image]
    environment: production

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 2m
          command_timeout: 30m
          script: |
            set -e

            # Escreve .env.prod a partir do secret
            mkdir -p /home/ubuntu/clinikai
            cat > /home/ubuntu/clinikai/.env.prod << 'ENVEOF'
            ${{ secrets.ENV_PROD }}
            ENVEOF
            chmod 600 /home/ubuntu/clinikai/.env.prod

            # Caminhos para sessão SSH não-interativa
            GIT=/usr/bin/git
            APP_DIR=/home/ubuntu/clinikai
            # Instala Docker se não estiver presente
            if [ ! -f /usr/bin/docker ]; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker ubuntu
            fi
            DOCKER=/usr/bin/docker

            # Clona o repo se não existir, senão atualiza
            if [ ! -d "$APP_DIR/.git" ]; then
              $GIT clone https://github.com/${{ github.repository }}.git $APP_DIR
            fi

            cd $APP_DIR
            $GIT pull origin main

            # Garante Node.js 20+ instalado
            NODE_VERSION=$(node --version 2>/dev/null | cut -d. -f1 | tr -d 'v' || echo "0")
            if [ "$NODE_VERSION" -lt 20 ]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # Corrige permissões do projeto
            sudo chown -R ubuntu:ubuntu $APP_DIR
            rm -rf $APP_DIR/clinikai-admin/dist
            
            # Build do Angular
            cd $APP_DIR/clinikai-admin
            npm ci --silent
            npx ng build --configuration production

            cd $APP_DIR

            # Faz login no GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | $DOCKER login ghcr.io -u ${{ github.actor }} --password-stdin

            # Atualiza IMAGE_TAG e GITHUB_REPOSITORY no .env.prod
            IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
            sed -i '/^IMAGE_TAG=/d' $APP_DIR/.env.prod
            sed -i '/^GITHUB_REPOSITORY=/d' $APP_DIR/.env.prod
            echo "IMAGE_TAG=${IMAGE_TAG}" >> $APP_DIR/.env.prod
            echo "GITHUB_REPOSITORY=${{ github.repository }}" >> $APP_DIR/.env.prod

            # Garante que o Postgres está rodando (necessário no primeiro deploy)
            $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml up -d postgres
            echo "Aguardando PostgreSQL ficar saudável..."
            for i in $(seq 1 12); do
              if $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml exec -T postgres pg_isready -U clinikai > /dev/null 2>&1; then
                echo "PostgreSQL pronto!"
                break
              fi
              echo "Aguardando... $i/12"
              sleep 5
            done

            # Pull e restart backend e nginx
            $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml pull backend
            $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml up -d --no-deps backend

            test -f "$APP_DIR/clinikai-admin/dist/browser/index.html"

            $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml up -d --no-deps --force-recreate nginx
            
            # Logs em tempo real por 30s
            echo "=== Logs do backend ==="
            timeout 30 $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml logs -f backend || true

            echo "=== Status dos containers ==="
            $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml ps

            # Health check com retry (Spring Boot leva ~30s para iniciar)
            echo "Aguardando backend inicializar..."
            HTTP_STATUS="000"
            for i in $(seq 1 18); do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000")
              echo "Tentativa $i/18: $HTTP_STATUS"
              if [ "$HTTP_STATUS" = "200" ]; then
                break
              fi
              sleep 5
            done

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "=== Backend logs ==="
              $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml logs --tail=50 backend
              echo "=== Nginx logs ==="
              $DOCKER compose --env-file $APP_DIR/.env.prod -f $APP_DIR/docker-compose.prod.yml logs --tail=30 nginx
              exit 1
            fi

            echo "Deploy concluido! Imagem: $IMAGE_TAG"
            $DOCKER image prune -f
