name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'clinikai-admin/**'
      - 'docker-compose.prod.yml'
      - 'nginx/**'
  workflow_dispatch: # permite rodar manualmente

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/clinikai-backend

jobs:
  # ─── 1. Testes e build do backend ─────────────────────────────────────────
  test-and-build:
    name: Test & Build Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clinikai
          POSTGRES_USER: clinikai
          POSTGRES_PASSWORD: clinikai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        working-directory: backend
        run: ./gradlew test --no-daemon

      - name: Build JAR
        working-directory: backend
        run: ./gradlew bootJar --no-daemon -x test

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 1

  # ─── 2. Build e push da imagem Docker para o GHCR ─────────────────────────
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-and-build
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Deploy na EC2 ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-image]
    environment: production

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/clinikai

            # Atualiza o código do repositório
            git pull origin main

            # Garante Node.js instalado (idempotente)
            if ! command -v node &> /dev/null; then
              sudo apt-get install -y nodejs npm
            fi

            # Build do Angular
            cd clinikai-admin
            npm ci --silent
            npm run build -- --configuration production
            cd ..

            # Faz login no GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Exporta variáveis de ambiente
            export $(grep -v '^#' .env.prod | xargs)
            export GITHUB_REPOSITORY=${{ github.repository }}
            export IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)

            # Pull da nova imagem e restart
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --no-deps backend nginx

            # Aguarda o backend subir
            echo "Aguardando backend subir..."
            sleep 15

            # Health check
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "Deploy falhou no health check (status: $HTTP_STATUS)"
              exit 1
            fi

            echo "Deploy concluido! Imagem: $IMAGE_TAG"

            # Limpa imagens antigas
            docker image prune -f
